name: CI

on:
  workflow_dispatch:

  pull_request:

  push:
    branches:
      - master

  # Weekly run so that breakage from new upstream releases is caught even when
  # there is no activity in this repository.
  schedule:
    - cron: "0 6 * * 1"  # Mondays, 06:00 UTC

permissions:
  contents: read

jobs:
  test:
    # The scheduled run only exercises the bleeding-edge job.
    if: ${{ github.event_name != 'schedule' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        value:
          - name: "3.10"
            python-version: "3.10"
            extra-install: ""
          - name: "3.11"
            python-version: "3.11"
            extra-install: ""
          - name: "3.12"
            python-version: "3.12"
            extra-install: ""
          - name: "3.13"
            python-version: "3.13"
            extra-install: ""
          - name: "3.13-pre-beartype"
            python-version: "3.13"
            extra-install: "uv pip install --upgrade --pre beartype"
          - name: "3.14"
            python-version: "3.14"
            extra-install: ""
          - name: "3.14-pre-beartype"
            python-version: "3.14"
            extra-install: "uv pip install --upgrade --pre beartype"

    name: Test ${{ matrix.value.name }}
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.value.python-version }}
        uses: astral-sh/setup-uv@d0cc045d04ccac9d8b7881df0226f9e82c39688e # v6.8.0
        with:
          python-version: ${{ matrix.value.python-version }}
      - name: Install dependencies
        run: |
          uv sync --group dev --locked
          ${{ matrix.value.extra-install }}
      - name: Test linter assertions
        run: uv run --frozen nox -s typecheck
      - name: Run tests
        run: |
          PRAGMA_VERSION=`uv run python -c "import sys; print('.'.join(map(str, sys.version_info[:2])))"` \
          uv run --frozen pytest -v --cov=src/plum --cov-report term-missing --cov-report lcov:coverage.lcov
      - name: Coveralls parallel
        uses: coverallsapp/github-action@v2
        with:
          flag-name: run-${{ matrix.value.name }}
          parallel: true
          file: coverage.lcov

  # Test against the newest available dependencies, ignoring `uv.lock`, and
  # against the newest `beartype` including release candidates. This is expected
  # to break from time to time, so it is allowed to fail.
  test-bleeding-edge:
    name: Test bleeding edge ${{ matrix.python-version }}
    continue-on-error: true
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.13", "3.14"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: astral-sh/setup-uv@681c641aba71e4a1c380be3ab5e12ad51f415867 # v7.1.6
        with:
          python-version: ${{ matrix.python-version }}

      # `--upgrade` re-resolves rather than using the pinned `uv.lock`, and
      # `--prerelease=allow` lets pre-releases into that resolution.
      - name: Install newest dependencies
        run: |
          uv sync --no-default-groups --group test_runtime --upgrade --prerelease=allow
          uv pip install --upgrade --prerelease=allow beartype

      - name: Report resolved versions
        run: uv pip list

      - name: Run tests
        run: uv run --no-sync pytest -v

  # Test that `mypyc`-compiled wheels work.
  test-mypyc:
    name: Test mypyc wheel
    if: ${{ github.event_name != 'schedule' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up uv
        uses: astral-sh/setup-uv@681c641aba71e4a1c380be3ab5e12ad51f415867 # v7.1.6
        with:
          python-version: "3.12"

      - name: Install build & test dependencies
        run: uv sync --locked --no-install-project --no-default-groups --group build --group wheels --group test_static --group test_runtime

      - name: Build mypyc wheel
        run: uv run --no-sync python -m build --wheel
        env:
          HATCH_BUILD_HOOKS_ENABLE: "1"

      - name: Install wheel
        run: uv pip install dist/*.whl

      - name: Verify compiled
        run: uv run --no-sync python -c "from plum import COMPILED; print(f'COMPILED={COMPILED}'); assert COMPILED"

      - name: Run tests
        run: uv run --no-sync pytest tests/ -v -k "not incompatible_with_mypyc" --ignore=tests/advanced

  finish:
    name: Finish coverage
    needs: test
    if: ${{ always() && github.event_name != 'schedule' }}
    runs-on: ubuntu-latest
    steps:
      - name: Coveralls finished
        uses: coverallsapp/github-action@v2
        with:
          parallel-finished: true
